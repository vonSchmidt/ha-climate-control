name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & type-check ────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff — lint
        run: ruff check custom_components/ tests/

      - name: Ruff — format check
        run: ruff format --check custom_components/ tests/

      - name: Mypy — type check
        run: mypy custom_components/

  # ── Tests ────────────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ -v \
            --cov=custom_components/climate_control \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Manifest validation ───────────────────────────────────────────────────────
  validate-manifest:
    name: Validate manifest.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check manifest required fields
        run: |
          python - <<'EOF'
          import json, sys
          with open("custom_components/climate_control/manifest.json") as f:
              m = json.load(f)
          required = {"domain", "name", "version", "codeowners", "iot_class", "config_flow"}
          missing = required - m.keys()
          if missing:
              print(f"Missing manifest fields: {missing}", file=sys.stderr)
              sys.exit(1)
          print("manifest.json OK ✅")
          EOF

      - name: Check manifest version matches pyproject.toml
        run: |
          python - <<'EOF'
          import json, re, sys
          with open("custom_components/climate_control/manifest.json") as f:
              manifest_version = json.load(f)["version"]
          with open("pyproject.toml") as f:
              content = f.read()
          match = re.search(r'^version\s*=\s*"([^"]+)"', content, re.MULTILINE)
          if not match:
              print("Could not find version in pyproject.toml", file=sys.stderr)
              sys.exit(1)
          pyproject_version = match.group(1)
          if manifest_version != pyproject_version:
              print(
                  f"Version mismatch: manifest={manifest_version}, pyproject={pyproject_version}",
                  file=sys.stderr,
              )
              sys.exit(1)
          print(f"Versions match ({manifest_version}) ✅")
          EOF

  # ── Auto-release ─────────────────────────────────────────────────────────────
  release:
    name: Auto-version & release
    runs-on: ubuntu-latest
    needs: [test, validate-manifest]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version from conventional commits
        id: semver
        run: |
          python3 - << 'PYEOF'
          import json, os, re, subprocess, sys

          with open("custom_components/climate_control/manifest.json") as f:
              current = json.load(f)["version"]
          major, minor, patch = map(int, current.split("."))

          tags = subprocess.run(
              ["git", "tag", "--sort=-version:refname", "--list", "v*"],
              capture_output=True, text=True,
          ).stdout.splitlines()
          tags = [t.strip() for t in tags if t.strip()]
          last_tag = tags[0] if tags else None

          log_range = f"{last_tag}..HEAD" if last_tag else "HEAD"
          messages = subprocess.run(
              ["git", "log", log_range, "--format=%s"],
              capture_output=True, text=True,
          ).stdout.strip().splitlines()

          bump = None
          for msg in messages:
              if "BREAKING CHANGE" in msg or re.match(r"^[a-z]+(\(.+\))?!:", msg):
                  bump = "major"
                  break
              if re.match(r"^feat(\(.+\))?:", msg) and bump != "major":
                  bump = "minor"
              elif re.match(r"^fix(\(.+\))?:", msg) and bump not in ("major", "minor"):
                  bump = "patch"

          if bump is None:
              next_ver = "NO_RELEASE"
          else:
              if bump == "major":
                  major, minor, patch = major + 1, 0, 0
              elif bump == "minor":
                  minor, patch = minor + 1, 0
              else:
                  patch += 1
              next_ver = f"{major}.{minor}.{patch}"

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"version={next_ver}\n")
          print(f"Next version: {next_ver}")
          PYEOF

      - name: Bump version in manifest.json and pyproject.toml
        if: steps.semver.outputs.version != 'NO_RELEASE'
        run: |
          NEW_VER="${{ steps.semver.outputs.version }}"
          python - "$NEW_VER" <<'EOF'
          import json, sys, re

          new_ver = sys.argv[1]

          # Update manifest.json
          with open("custom_components/climate_control/manifest.json") as f:
              manifest = json.load(f)
          manifest["version"] = new_ver
          with open("custom_components/climate_control/manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")

          # Update pyproject.toml
          with open("pyproject.toml") as f:
              content = f.read()
          content = re.sub(
              r'^(version\s*=\s*")[^"]+(")',
              rf'\g<1>{new_ver}\2',
              content,
              flags=re.MULTILINE,
          )
          with open("pyproject.toml", "w") as f:
              f.write(content)

          print(f"Bumped to {new_ver}")
          EOF

      - name: Commit version bump
        if: steps.semver.outputs.version != 'NO_RELEASE'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/climate_control/manifest.json pyproject.toml
          git commit -m "chore: bump version to ${{ steps.semver.outputs.version }} [skip ci]"
          git push origin main

      - name: Create tag and GitHub release
        if: steps.semver.outputs.version != 'NO_RELEASE'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.semver.outputs.version }}
          name: v${{ steps.semver.outputs.version }}
          generate_release_notes: true
