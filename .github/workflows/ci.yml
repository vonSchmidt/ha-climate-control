name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & type-check ────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff — lint
        run: ruff check custom_components/ tests/

      - name: Ruff — format check
        run: ruff format --check custom_components/ tests/

      - name: Mypy — type check
        run: mypy custom_components/

  # ── Tests ────────────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ -v \
            --cov=custom_components/climate_control \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Manifest validation ───────────────────────────────────────────────────────
  validate-manifest:
    name: Validate manifest.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check manifest required fields
        run: |
          python - <<'EOF'
          import json, sys
          with open("custom_components/climate_control/manifest.json") as f:
              m = json.load(f)
          required = {"domain", "name", "version", "codeowners", "iot_class", "config_flow"}
          missing = required - m.keys()
          if missing:
              print(f"Missing manifest fields: {missing}", file=sys.stderr)
              sys.exit(1)
          print("manifest.json OK ✅")
          EOF

      - name: Check manifest version matches pyproject.toml
        run: |
          python - <<'EOF'
          import json, re, sys
          with open("custom_components/climate_control/manifest.json") as f:
              manifest_version = json.load(f)["version"]
          with open("pyproject.toml") as f:
              content = f.read()
          match = re.search(r'^version\s*=\s*"([^"]+)"', content, re.MULTILINE)
          if not match:
              print("Could not find version in pyproject.toml", file=sys.stderr)
              sys.exit(1)
          pyproject_version = match.group(1)
          if manifest_version != pyproject_version:
              print(
                  f"Version mismatch: manifest={manifest_version}, pyproject={pyproject_version}",
                  file=sys.stderr,
              )
              sys.exit(1)
          print(f"Versions match ({manifest_version}) ✅")
          EOF

  # ── Auto-release ─────────────────────────────────────────────────────────────
  release:
    name: Tag & release
    runs-on: ubuntu-latest
    needs: [test, validate-manifest]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest.json
        id: version
        run: |
          VERSION=$(python -c "import json; print(json.load(open('custom_components/climate_control/manifest.json'))['version'])")
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
